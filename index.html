<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>จองห้องพัก</title>

<style>
body { font-family: Arial; padding:20px; max-width:400px; margin:auto; }
input, select, button { width:100%; padding:10px; margin:5px 0; }
.status { font-weight:bold; }
</style>

</head>

<body>

<h2>จองห้องพัก</h2>

<select id="room">
  <option>ห้อง A</option>
  <option>ห้อง B</option>
</select>

<input type="datetime-local" id="start">
<input type="datetime-local" id="end">

<button onclick="checkRoom()">เช็คห้องว่าง</button>

<div id="status" class="status"></div>

<input placeholder="ชื่อ" id="name">
<input placeholder="เบอร์" id="phone">
<input placeholder="Email" id="email">

<label>แนบสลิป (บังคับ)</label>
<input type="file" id="slip" accept="image/*">

<button id="btn" onclick="send()">จอง</button>

<script>

const API = "https://script.google.com/macros/s/AKfycbwlMvvXhhPEwlGLr5v7AgvaCXL8LWHrVHokLDt6oMQjLFrpaPdoAJLlBpt4t7T1BDX4/exec";

let available = false;

// 🔍 เช็คห้องว่าง
function checkRoom() {

  if (!start.value || !end.value) {
    alert("เลือกวันก่อน");
    return;
  }

  fetch(`${API}?room=${room.value}&start=${start.value}&end=${end.value}`)
  .then(r => r.text())
  .then(res => {

    if (res === "AVAILABLE") {
      status.innerHTML = "✅ ห้องว่าง";
      status.style.color = "green";
      available = true;
    } else {
      status.innerHTML = "❌ ห้องเต็ม";
      status.style.color = "red";
      available = false;
    }

  });
}

// 📤 ส่งจอง
function send() {

  if (!available) {
    alert("กรุณาเช็คห้องก่อน");
    return;
  }

  const file = slip.files[0];
  if (!file) {
    alert("ต้องแนบสลิป");
    return;
  }

  btn.disabled = true;

  const reader = new FileReader();

  reader.onload = function() {
    const base64 = reader.result.split(',')[1];

    fetch(API, {
      method: "POST",
      body: JSON.stringify({
        room: room.value,
        start: start.value,
        end: end.value,
        name: name.value,
        phone: phone.value,
        email: email.value,
        slipBase64: base64,
        slipType: file.type
      })
    })
    .then(r => r.text())
    .then(res => {

      btn.disabled = false;

      if (res === "SUCCESS") {
        alert("✅ จองสำเร็จ (รอตรวจสอบ)");
        location.reload();
      } 
      else if (res === "FULL") {
        alert("❌ ห้องเต็ม (มีคนจองไปแล้ว)");
      }
      else {
        alert("❌ Error");
      }

    });

  };

  reader.readAsDataURL(file);
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>จองที่พัก</title>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    :root {
      --primary: #2C5F8A;
      --primary-light: #3A7CBD;
      --primary-dark: #1A3F5C;
      --accent: #E8A44A;
      --accent-light: #F5C272;
      --success: #2D8A5E;
      --danger: #C0392B;
      --bg: #F4F7FB;
      --card: #FFFFFF;
      --text: #1A2A3A;
      --text-muted: #6B7C8D;
      --border: #D8E4EF;
      --shadow: 0 4px 24px rgba(44,95,138,0.10);
      --radius: 14px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Prompt', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      padding: 0 0 40px 0;
      color: var(--text);
    }

    .header {
      background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 60%, var(--primary-light) 100%);
      padding: 32px 24px 48px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .header::before {
      content: '';
      position: absolute;
      width: 200px; height: 200px;
      background: rgba(255,255,255,0.05);
      border-radius: 50%;
      top: -60px; right: -60px;
    }
    .header::after {
      content: '';
      position: absolute;
      width: 140px; height: 140px;
      background: rgba(255,255,255,0.04);
      border-radius: 50%;
      bottom: 10px; left: -40px;
    }
    .header-icon {
      font-size: 40px;
      margin-bottom: 8px;
      display: block;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.3));
    }
    .header h1 {
      color: #fff;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.5px;
      position: relative;
      z-index: 1;
    }
    .header p {
      color: rgba(255,255,255,0.75);
      font-size: 13px;
      margin-top: 4px;
      font-weight: 300;
      position: relative;
      z-index: 1;
    }

    .room-badge-wrap {
      margin: -24px 20px 0;
      position: relative;
      z-index: 10;
    }
    .room-badge {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      border-left: 5px solid var(--accent);
    }
    .room-badge-icon {
      width: 52px; height: 52px;
      background: linear-gradient(135deg, var(--accent), var(--accent-light));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
      box-shadow: 0 4px 12px rgba(232,164,74,0.35);
    }
    .room-badge-info { flex: 1; }
    .room-badge-label {
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .room-badge-name {
      font-size: 20px;
      font-weight: 700;
      color: var(--primary-dark);
      line-height: 1.2;
    }
    .room-badge-status {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: #FFF3E0;
      color: #E65100;
      font-size: 12px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
      margin-top: 4px;
    }
    .dot-pulse {
      width: 7px; height: 7px;
      background: #E65100;
      border-radius: 50%;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.7); }
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      margin: 16px 20px 0;
      padding: 22px 20px;
    }
    .card-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .field { margin-bottom: 16px; }
    .field:last-child { margin-bottom: 0; }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 7px;
    }
    .required { color: var(--danger); }

    input[type="text"],
    input[type="tel"],
    input[type="date"] {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 15px;
      font-family: 'Prompt', sans-serif;
      color: var(--text);
      background: #FAFCFE;
      transition: border-color 0.2s, box-shadow 0.2s;
      -webkit-appearance: none;
    }
    input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(44,95,138,0.10);
      background: #fff;
    }

    .date-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .nights-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #EBF4FF;
      color: var(--primary);
      font-size: 13px;
      font-weight: 600;
      padding: 8px 12px;
      border-radius: 8px;
      margin-top: 10px;
    }

    .slip-upload-area {
      border: 2px dashed var(--border);
      border-radius: 12px;
      padding: 24px 16px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: #FAFCFE;
      position: relative;
    }
    .slip-upload-area:hover { border-color: var(--primary); background: #EBF4FF; }
    .slip-upload-area.has-file { border-color: var(--success); background: #F0FAF5; }
    .slip-upload-area input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }
    .upload-icon { font-size: 32px; margin-bottom: 6px; }
    .upload-text { font-size: 14px; color: var(--text-muted); font-weight: 500; }
    .upload-hint { font-size: 12px; color: #aab; margin-top: 4px; }

    .slip-preview { margin-top: 12px; border-radius: 10px; overflow: hidden; display: none; }
    .slip-preview img {
      width: 100%;
      max-height: 220px;
      object-fit: contain;
      border-radius: 10px;
      border: 1.5px solid var(--border);
    }
    .slip-preview-label {
      font-size: 12px;
      color: var(--success);
      font-weight: 600;
      margin-top: 6px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .btn-submit {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: calc(100% - 40px);
      margin: 20px 20px 0;
      padding: 16px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 17px;
      font-weight: 700;
      font-family: 'Prompt', sans-serif;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(44,95,138,0.35);
      transition: all 0.2s;
      letter-spacing: 0.3px;
    }
    .btn-submit:active { transform: translateY(1px); box-shadow: 0 2px 8px rgba(44,95,138,0.25); }
    .btn-submit:disabled { background: #c5cdd6; box-shadow: none; cursor: not-allowed; }

    .loading-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      gap: 16px;
      padding: 40px;
    }
    .spinner {
      width: 44px; height: 44px;
      border: 4px solid rgba(44,95,138,0.15);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { color: var(--text-muted); font-size: 14px; }

    .error-screen {
      margin: 40px 20px;
      background: #FDECEA;
      border-left: 4px solid var(--danger);
      border-radius: 10px;
      padding: 18px 16px;
      color: var(--danger);
      font-size: 14px;
      font-weight: 500;
    }

    .success-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(26,42,58,0.7);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .success-overlay.show { display: flex; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .success-card {
      background: #fff;
      border-radius: 20px;
      padding: 36px 28px;
      text-align: center;
      max-width: 320px;
      width: 100%;
      animation: popUp 0.35s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes popUp { from { transform: scale(0.85); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .success-icon { font-size: 56px; margin-bottom: 12px; }
    .success-title { font-size: 20px; font-weight: 700; color: var(--success); margin-bottom: 8px; }
    .success-msg { font-size: 14px; color: var(--text-muted); line-height: 1.6; }

    .btn-spinner {
      width: 18px; height: 18px;
      border: 3px solid rgba(255,255,255,0.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
      display: none;
    }
  </style>
</head>
<body>

<!-- Loading -->
<div id="loadingScreen" class="loading-screen">
  <div class="spinner"></div>
  <span class="loading-text">กำลังโหลด...</span>
</div>

<!-- Main content -->
<div id="mainContent" style="display:none;">

  <div class="header">
    <span class="header-icon">🏨</span>
    <h1>จองที่พัก</h1>
    <p>กรอกข้อมูลให้ครบเพื่อยืนยันการจอง</p>
  </div>

  <div class="room-badge-wrap">
    <div class="room-badge">
      <div class="room-badge-icon">🛏️</div>
      <div class="room-badge-info">
        <div class="room-badge-label">ห้องที่เลือก</div>
        <div class="room-badge-name" id="roomDisplay">ห้อง A</div>
        <div class="room-badge-status">
          <span class="dot-pulse"></span>
          รอกรอกข้อมูล
        </div>
      </div>
    </div>
  </div>

  <form id="bookingForm">
    <input type="hidden" id="room" value="A">

    <div class="card">
      <div class="card-title">👤 ข้อมูลผู้จอง</div>
      <div class="field">
        <label>ชื่อ-นามสกุล <span class="required">*</span></label>
        <input type="text" id="name" placeholder="เช่น สมชาย ใจดี" required autocomplete="off">
      </div>
      <div class="field">
        <label>เบอร์โทรศัพท์ <span class="required">*</span></label>
        <input type="tel" id="phone" placeholder="เช่น 0812345678" pattern="[0-9]{9,10}" required>
      </div>
    </div>

    <div class="card">
      <div class="card-title">📅 วันที่เข้าพัก</div>
      <div class="date-row">
        <div class="field">
          <label>เช็คอิน <span class="required">*</span></label>
          <input type="date" id="checkIn" required onchange="calcNights()">
        </div>
        <div class="field">
          <label>เช็คเอาท์ <span class="required">*</span></label>
          <input type="date" id="checkOut" required onchange="calcNights()">
        </div>
      </div>
      <div id="nightsInfo" style="display:none;" class="nights-badge">
        🌙 <span id="nightsText"></span>
      </div>
    </div>

    <div class="card">
      <div class="card-title">💳 สลิปโอนเงิน</div>
      <div class="slip-upload-area" id="uploadArea">
        <input type="file" id="slipFile" accept="image/*" required onchange="previewSlip(event)">
        <div class="upload-icon">📎</div>
        <div class="upload-text">แตะเพื่ออัปโหลดสลิป</div>
        <div class="upload-hint">รองรับ JPG, PNG (สูงสุด 5MB)</div>
      </div>
      <div class="slip-preview" id="slipPreview">
        <img id="slipImg" src="" alt="สลิป">
        <div class="slip-preview-label">✅ แนบสลิปเรียบร้อย</div>
      </div>
    </div>

  </form>

  <button class="btn-submit" id="submitBtn" onclick="submitBooking()">
    <span class="btn-spinner" id="btnSpinner"></span>
    <span id="btnText">✅ ยืนยันการจอง</span>
  </button>

</div>

<!-- Error -->
<div id="errorScreen" style="display:none;">
  <div class="error-screen" id="errorMsg">❌ ไม่สามารถโหลดได้</div>
</div>

<!-- Success overlay -->
<div class="success-overlay" id="successOverlay">
  <div class="success-card">
    <div class="success-icon">🎉</div>
    <div class="success-title">จองสำเร็จ!</div>
    <div class="success-msg" id="successMsg">ส่งข้อมูลเรียบร้อยแล้ว<br>รอแอดมินยืนยันนะคะ 🙏</div>
  </div>
</div>

<script>
  // ✅ เปลี่ยน GAS_URL เป็น Web App URL ของคุณ
  const GAS_URL   = 'https://script.google.com/macros/s/AKfycbwyZPneiI-z1Uf2HT0GUsz8Gc9HPAVfZBbkMkLiqP8XzIQN6N6rlHaF6XP4VZGqVLmagQ/exec';
  const LIFF_ID   = '2009597872-3RfPCP2A';
  const IMGBB_KEY = 'f02c86abd0edb6ce9d8e8f60bbf124af';

  // ✅ รองรับห้อง A-M (13 ห้อง)
  const VALID_ROOMS = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H', 'I', 'J', 'K', 'L', 'M'];

  // ═══════════════════════
  // Init LIFF
  // ═══════════════════════
  window.onload = async function () {
    const params = new URLSearchParams(window.location.search);
    let room = (params.get('room') || 'A').toUpperCase();
    
    // ✅ ตรวจสอบว่าห้องถูกต้อง
    if (!VALID_ROOMS.includes(room)) {
      room = 'A';
    }
    
    document.getElementById('room').value = room;
    document.getElementById('roomDisplay').textContent = `ห้อง ${room}`;

    const today = new Date().toISOString().split('T')[0];
    document.getElementById('checkIn').setAttribute('min', today);
    document.getElementById('checkOut').setAttribute('min', today);

    try {
      await liff.init({ liffId: LIFF_ID });
      if (!liff.isLoggedIn()) { liff.login(); return; }
      document.getElementById('loadingScreen').style.display = 'none';
      document.getElementById('mainContent').style.display = 'block';
    } catch (err) {
      document.getElementById('loadingScreen').style.display = 'none';
      document.getElementById('errorScreen').style.display = 'block';
      document.getElementById('errorMsg').textContent = '❌ กรุณาเปิดผ่าน LINE';
    }
  };

  // ═══════════════════════
  // คำนวณคืน
  // ═══════════════════════
  function calcNights() {
    const ci = document.getElementById('checkIn').value;
    const co = document.getElementById('checkOut').value;
    const info = document.getElementById('nightsInfo');
    if (!ci || !co) { info.style.display = 'none'; return; }
    const nights = Math.round((new Date(co) - new Date(ci)) / 86400000);
    if (nights > 0) {
      document.getElementById('nightsText').textContent =
        `${nights} คืน (เช็คอิน 14:00 น. / เช็คเอาท์ 12:00 น.)`;
      info.style.display = 'flex';
    } else {
      info.style.display = 'none';
    }
    document.getElementById('checkOut').setAttribute('min', ci);
  }

  // ═══════════════════════
  // Preview สลิป
  // ═══════════════════════
  function previewSlip(e) {
    const file = e.target.files[0];
    if (!file) return;
    if (file.size > 5 * 1024 * 1024) {
      alert('❌ ไฟล์ใหญ่เกิน 5MB กรุณาเลือกรูปใหม่');
      e.target.value = '';
      return;
    }
    const reader = new FileReader();
    reader.onload = ev => {
      document.getElementById('slipImg').src = ev.target.result;
      document.getElementById('slipPreview').style.display = 'block';
      document.getElementById('uploadArea').classList.add('has-file');
    };
    reader.readAsDataURL(file);
  }

  // ═══════════════════════
  // แปลงไฟล์ → base64
  // ═══════════════════════
  function toBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload  = () => resolve(reader.result.split(',')[1]);
      reader.onerror = () => reject(new Error('อ่านไฟล์ไม่ได้'));
      reader.readAsDataURL(file);
    });
  }

  // ═══════════════════════
  // อัปโหลดสลิป → ImgBB
  // ═══════════════════════
  async function uploadToImgBB(file) {
    const base64 = await toBase64(file);

    const formData = new FormData();
    formData.append('image', base64);

    const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, {
      method: 'POST',
      body: formData
    });

    const result = await response.json();
    console.log('ImgBB response:', JSON.stringify(result));

    if (result.success) {
      return result.data.url;
    } else {
      throw new Error('อัปโหลดสลิปไม่สำเร็จ: ' + (result.error?.message || 'unknown error'));
    }
  }

  // ═══════════════════════
  // Submit
  // ═══════════════════════
  async function submitBooking() {
    const name     = document.getElementById('name').value.trim();
    const phone    = document.getElementById('phone').value.trim();
    const room     = document.getElementById('room').value;
    const checkIn  = document.getElementById('checkIn').value;
    const checkOut = document.getElementById('checkOut').value;
    const slipFile = document.getElementById('slipFile').files[0];

    if (!name)     { alert('❌ กรุณากรอกชื่อ-นามสกุล'); return; }
    if (!phone || !/^[0-9]{9,10}$/.test(phone)) {
      alert('❌ กรุณากรอกเบอร์โทรให้ถูกต้อง (9-10 หลัก)'); return;
    }
    if (!checkIn)  { alert('❌ กรุณาเลือกวันเช็คอิน'); return; }
    if (!checkOut) { alert('❌ กรุณาเลือกวันเช็คเอาท์'); return; }
    if (new Date(checkIn) >= new Date(checkOut)) {
      alert('❌ วันเช็คเอาท์ต้องหลังวันเช็คอิน'); return;
    }
    if (!slipFile) { alert('❌ กรุณาแนบสลิปการโอนเงิน'); return; }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    document.getElementById('btnSpinner').style.display = 'block';
    document.getElementById('btnText').textContent = 'กำลังอัปโหลดสลิป...';

    try {
      const profile = await liff.getProfile();
      const userId  = profile.userId;

      const slipUrl = await uploadToImgBB(slipFile);

      document.getElementById('btnText').textContent = 'กำลังส่งข้อมูล...';

      const res = await fetch(GAS_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=UTF-8' },
        body: JSON.stringify({
          type: 'LIFF_BOOKING',
          userId, name, phone, room, checkIn, checkOut,
          slipUrl
        })
      });

      const result = await res.json();

      if (result.success) {
        const nights = Math.round((new Date(checkOut) - new Date(checkIn)) / 86400000);
        document.getElementById('successMsg').innerHTML =
          `🏨 ห้อง ${room} | ${nights} คืน<br>` +
          `📅 ${checkIn} → ${checkOut}<br><br>` +
          `รอแอดมินยืนยันนะคะ 🙏`;
        document.getElementById('successOverlay').classList.add('show');
        setTimeout(() => liff.closeWindow(), 3000);
      } else {
        alert('❌ ' + (result.message || 'เกิดข้อผิดพลาด'));
        btn.disabled = false;
        document.getElementById('btnSpinner').style.display = 'none';
        document.getElementById('btnText').textContent = '✅ ยืนยันการจอง';
      }

    } catch (err) {
      console.error('Submit error:', err);
      alert('❌ ' + err.message);
      btn.disabled = false;
      document.getElementById('btnSpinner').style.display = 'none';
      document.getElementById('btnText').textContent = '✅ ยืนยันการจอง';
    }
  }
</script>
</body>
</html>
